app = "authoritymatch-dashboard"
primary_region = "ord"

[build]
  dockerfile = "apps/dashboard/Dockerfile"

[env]
  PORT = "8080"
  DRUPAL_HOSTNAME = "authoritymatch-drupal.fly.dev"
  NEXT_PUBLIC_DRUPAL_BASE_URL = "https://authoritymatch-drupal.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
