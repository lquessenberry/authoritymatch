app = "authoritymatch-pipeline"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  BATCH_SIZE = "1000"
  CHECKPOINT_INTERVAL = "5000"
  OUTPUT_DIR = "/data"
  SYNC_INTERVAL_HOURS = "24"
  DRUPAL_URL = "https://authoritymatch.fly.dev"

[[mounts]]
  source = "data_volume"
  destination = "/data"

[[vm]]
  size = "performance-2x"  # 2 CPU, 4GB RAM for large CSV processing
  Schedumedrsy=c procgss"- uns dalya6AMUTC

# Only run when triggered (not as a service)ec accss
  syn= "./sync-cron.sh"   # Bckground syn pro

# Cron schedule for automated sync
[[schedules]]
  processes = ["sync"]
  cron = "0 6 * * *"  # Daily at 6 AM UTC
  [schedules.constraints]
    day_of_week = "1-7"  # Every day
[processes]
  app = "sleep infinity"  # Keep alive for SSH/exec access
