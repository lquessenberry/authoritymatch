app = "authoritymatch-pipeline"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  BATCH_SIZE = "1000"
  CHECKPOINT_INTERVAL = "5000"
  OUTPUT_DIR = "/data"
  SYNC_INTERVAL_HOURS = "24"
  DRUPAL_URL = "https://authoritymatch.fly.dev"

[[mounts]]
  source = "data_volume"
  destination = "/data"

[[vm]]
  size = "performance-2x"  # 2 CPU, 4GB RAM for large CSV processing

[processes]
  app = "sleep infinity"  # Keep alive for SSH/exec access
  sync = "./sync-cron.sh"  # Background sync process

# Cron schedule for automated sync (daily at 6 AM UTC)
[[schedules]]
  processes = ["sync"]
  cron = "0 6 * * *"
