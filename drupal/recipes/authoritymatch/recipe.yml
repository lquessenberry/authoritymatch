name: 'AuthorityMatch Base'
description: 'Installs AuthorityMatch content types, taxonomy, and configuration for trucker-factor matching.'
type: 'Site'
recipes:
  - core/recipes/standard
  - nextagencyio/drupalx_decoupled_content
install:
  # Core
  - node
  - field
  - field_ui
  - taxonomy
  - user
  - system
  - text
  - options
  - datetime
  - file
  - image
  - views
  - views_ui
  # Contrib
  - graphql_compose
  - simple_oauth
  - paragraphs
  - paragraphs_ee
  - entity_reference_revisions
  - field_group
  - admin_toolbar
  - admin_toolbar_tools
  # Custom
  - authoritymatch_core
config:
  import:
    node:
      # --- Authority Record (FMCSA trucker profile) ---
      - field.field.node.authority_record.field_mc_number
      - field.field.node.authority_record.field_dot_number
      - field.field.node.authority_record.field_company_name
      - field.field.node.authority_record.field_contact_info
      - field.field.node.authority_record.field_authority_date
      - field.field.node.authority_record.field_equipment_type
      - field.field.node.authority_record.field_factoring_status
      - field.field.node.authority_record.field_credit_score
      - field.field.node.authority_record.field_monthly_volume
      - field.field.node.authority_record.field_years_in_business
      - field.field.node.authority_record.field_safety_rating
      - field.field.node.authority_record.field_location
      - node.type.authority_record
      # --- Lead (trucker inquiry / match request) ---
      - field.field.node.lead.field_authority_record
      - field.field.node.lead.field_requesting_factor
      - field.field.node.lead.field_lead_status
      - field.field.node.lead.field_lead_source
      - field.field.node.lead.field_match_score
      - field.field.node.lead.field_submitted_at
      - field.field.node.lead.field_notes
      - node.type.lead
      # --- Factor Profile (factoring company) ---
      - field.field.node.factor_profile.field_company_name
      - field.field.node.factor_profile.field_contact_email
      - field.field.node.factor_profile.field_contact_phone
      - field.field.node.factor_profile.field_risk_appetite
      - field.field.node.factor_profile.field_advance_rate_min
      - field.field.node.factor_profile.field_advance_rate_max
      - field.field.node.factor_profile.field_min_monthly_volume
      - field.field.node.factor_profile.field_max_monthly_volume
      - field.field.node.factor_profile.field_equipment_types_accepted
      - field.field.node.factor_profile.field_states_served
      - field.field.node.factor_profile.field_subscription_tier
      - field.field.node.factor_profile.field_is_active
      - node.type.factor_profile
    taxonomy:
      - taxonomy.vocabulary.equipment_types
      - taxonomy.vocabulary.factoring_status
      - taxonomy.vocabulary.credit_tiers
      - taxonomy.vocabulary.volume_ranges
      - taxonomy.vocabulary.lead_status
      - taxonomy.vocabulary.risk_appetite
  actions:
    # Set up user roles
    user.role.trucker:
      ensure_exists:
        id: trucker
        label: 'Trucker'
        weight: 3
    user.role.factor_admin:
      ensure_exists:
        id: factor_admin
        label: 'Factor Admin'
        weight: 4
    user.role.network_admin:
      ensure_exists:
        id: network_admin
        label: 'Network Admin'
        weight: 5
    user.role.super_admin:
      ensure_exists:
        id: super_admin
        label: 'Super Admin'
        weight: 6
